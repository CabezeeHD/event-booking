apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: event-booking
spec:
  selector:
    matchLabels:
      app: mongodb-sts
  serviceName: mongodb
  replicas: 1
  template:
    metadata:
      labels:
        app: mongodb-sts
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: mongo-container
        image: mongo:latest
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_INITDB_ROOT_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "150m"
          limits:
            memory: "2Gi"
            cpu: "750m"
  volumeClaimTemplates:
    - metadata:
       name: mongodb-volume-pvc
      spec:
        storageClassName: "nfs-client"
        accessModes:
        - ReadWriteOnce
        resources:
         requests:
           storage: 1Gi
